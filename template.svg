<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1e272e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="botBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecf0f1"/>
      <stop offset="100%" stop-color="#95a5a6"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="hexPattern" width="100" height="86.6" patternUnits="userSpaceOnUse">
       <path d="M25 0 L75 0 L100 43.3 L75 86.6 L25 86.6 L0 43.3 Z" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <rect width="1280" height="720" fill="url(#hexPattern)"/>

  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="220" height="46" rx="23" fill="#2c3e50" stroke="#00d4ff" stroke-width="2"/>
    <text x="110" y="30" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#fff" text-anchor="middle">BlackboardAI</text>
  </g>

  <g transform="translate(960, 320)">
    <ellipse cx="140" cy="340" rx="90" ry="15" fill="#000" opacity="0.6" filter="url(#neonGlow)"/>
    <line x1="140" y1="50" x2="140" y2="10" stroke="#7f8c8d" stroke-width="4"/>
    <circle cx="140" cy="10" r="8" fill="#e74c3c" filter="url(#neonGlow)"/>
    <rect x="60" y="50" width="160" height="110" rx="35" fill="url(#botBody)"/>
    <rect x="75" y="70" width="130" height="70" rx="20" fill="#111"/>
    <g filter="url(#neonGlow)">
      <ellipse cx="110" cy="105" rx="14" ry="18" fill="#00d4ff"/>
      <ellipse cx="170" cy="105" rx="14" ry="18" fill="#00d4ff"/>
    </g>
    <path d="M 80 180 C 80 170, 200 170, 200 180 L 200 300 C 200 320, 80 320, 80 300 Z" fill="url(#botBody)"/>
    <rect x="105" y="210" width="70" height="50" rx="5" fill="#2c3e50"/>
    <path d="M 70 220 Q 40 220 30 250" stroke="#95a5a6" stroke-width="12" fill="none" stroke-linecap="round"/>
    <rect x="15" y="245" width="14" height="40" rx="2" fill="#fff" transform="rotate(-15 30 250)" filter="url(#neonGlow)"/>
  </g>

  <g id="title-group" transform="translate(140, 360)">
     </g>
</svg>