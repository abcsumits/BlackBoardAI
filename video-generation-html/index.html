<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat Driving a Car</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      background: linear-gradient(#87ceeb, #d0f0ff);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      font-family: sans-serif;
    }

    .road {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 30%;
      background: #444;
    }

    .road::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      height: 6px;
      width: 100%;
      background: repeating-linear-gradient(
        to right,
        #fff 0,
        #fff 40px,
        transparent 40px,
        transparent 80px
      );
      transform: translateY(-50%);
      animation: move-road 1.5s linear infinite;
    }

    @keyframes move-road {
      0% { background-position: 0 0; }
      100% { background-position: -80px 0; }
    }

    .car {
      position: relative;
      width: 300px;
      height: 120px;
      background: #ff5252;
      border-radius: 40px 40px 10px 10px;
      bottom: 30px;
      animation: bounce 1s ease-in-out infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-5px); }
    }

    .car::before {
      content: '';
      position: absolute;
      top: -40px;
      left: 20px;
      width: 260px;
      height: 60px;
      background: #e0e0e0;
      border-radius: 20px 20px 0 0;
      z-index: 1;
    }

    .window {
      position: absolute;
      top: -35px;
      left: 30px;
      width: 90px;
      height: 50px;
      background: #c0ecff;
      border-radius: 10px;
      z-index: 2;
    }

    .cat {
      position: absolute;
      top: -40px;
      left: 40px;
      width: 60px;
      height: 60px;
      background: #3b2f4a;
      border-radius: 50%;
      z-index: 3;
    }

    .cat::before, .cat::after {
      content: '';
      position: absolute;
      width: 15px;
      height: 15px;
      background: #3b2f4a;
      transform: rotate(45deg);
      top: -8px;
    }

    .cat::before {
      left: -5px;
    }

    .cat::after {
      right: -5px;
    }

    .cat .eyes {
      position: absolute;
      top: 20px;
      left: 10px;
      display: flex;
      gap: 10px;
    }

    .cat .eye {
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      position: relative;
    }

    .cat .eye::after {
      content: '';
      width: 5px;
      height: 5px;
      background: black;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
    }

    .wheels {
      position: absolute;
      bottom: -25px;
      left: 20px;
      display: flex;
      width: 260px;
      justify-content: space-between;
      z-index: 0;
    }

    .wheel {
      width: 50px;
      height: 50px;
      background: #222;
      border-radius: 50%;
      border: 5px solid #555;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

  </style>
</head>
<body>
  <div class="road"></div>
  <div class="car">
    <div class="window"></div>
    <div class="cat">
      <div class="eyes">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
    </div>
    <div class="wheels">
      <div class="wheel"></div>
      <div class="wheel"></div>
    </div>
  </div>
</body>
</html>
