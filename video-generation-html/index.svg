<svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" aria-label="Animated bouncing ball">
  <desc>A circle that bounces up and down and changes color over time.</desc>

  <!-- Ground -->
  <rect x="0" y="180" width="200" height="20" fill="#222" />

  <!-- Ball -->
  <circle cx="100" cy="100" r="20" fill="red">
    <!-- Bounce animation -->
    <animate attributeName="cy" values="100; 30; 100" dur="1s" repeatCount="indefinite" keyTimes="0; 0.5; 1" keySplines=".5 0 .5 1; .5 0 .5 1" calcMode="spline"/>
    
    <!-- Color animation -->
    <animate attributeName="fill" values="red;orange;yellow;lime;cyan;blue;magenta;red" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>