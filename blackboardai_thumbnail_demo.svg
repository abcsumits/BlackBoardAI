
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0f0d" />

  <!-- Slight vignette -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0b0f0d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>

    <!-- subtle noise using tiny circles (cheap texture) -->
    <pattern id="noise" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="3" r="0.6" fill="#ffffff" fill-opacity="0.02" />
      <circle cx="6" cy="6" r="0.6" fill="#ffffff" fill-opacity="0.02" />
    </pattern>

    <!-- chalk text filter: slight blur + contrast -->
    <filter id="chalk" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#noise)" opacity="0.25" />
  <rect width="100%" height="100%" fill="url(#vignette)" />

  <!-- Title area (center) -->
  <g transform="translate(0,40)">
    <rect x="60" y="80" rx="14" ry="14" width="1160" height="460" fill="#0c1a14" stroke="#234" stroke-opacity="0.12" />

    <!-- Chalk title: white with slight stroke to mimic chalk edges -->
    <text x="50%" y="300" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="92px" fill="#ffffff" fill-opacity="0.95"
          style="paint-order: stroke; stroke:#000000; stroke-width:2; stroke-opacity:0.18; filter:url(#chalk); letter-spacing:0.5px;">
      Neural Nets in 10 Minutes
    </text>

    <!-- Sub-heading / decorative line -->
    <line x1="260" x2="1020" y1="360" y2="360" stroke="#ffffff" stroke-opacity="0.08" stroke-width="4" />

    <!-- Channel badge bottom-left -->
    <g transform="translate(100,430)">
      <circle cx="40" cy="40" r="40" fill="#111" stroke="#ffffff" stroke-opacity="0.08" />
      <!-- simple B monogram -->
      <text x="40" y="48" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="36px" fill="#ffffff">B</text>
    </g>

    <text x="170" y="472" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28px" fill="#ffffff" fill-opacity="0.9">blackboardai</text>

    <!-- Small descriptor on bottom-right -->
    <text x="1120" y="472" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18px" fill="#ffffff" fill-opacity="0.6">EXPLAINED SIMPLY</text>
  </g>

  <!-- faint chalk marks for texture -->
  <g fill="#ffffff" fill-opacity="0.03">
    <ellipse cx="220" cy="180" rx="90" ry="20" />
    <ellipse cx="980" cy="260" rx="140" ry="26" />
    <ellipse cx="420" cy="420" rx="70" ry="18" />
  </g>
</svg>
